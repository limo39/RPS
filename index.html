<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      padding: 1rem;
    }

    /* ── Title ── */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e2b96f;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 12px rgba(226,185,111,0.3);
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8892b0;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    /* ── Scoreboard ── */
    .scoreboard {
      display: flex;
      gap: 2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 1rem 2.5rem;
      margin-bottom: 2.5rem;
      backdrop-filter: blur(8px);
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .score-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8892b0;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-value.player  { color: #64ffda; }
    .score-value.ties    { color: #e2b96f; }
    .score-value.computer{ color: #ff6b9d; }

    /* ── Arena ── */
    .arena {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .combatant {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .combatant-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8892b0;
    }

    .choice-display {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .choice-display.win {
      border-color: #64ffda;
      background: rgba(100,255,218,0.08);
      box-shadow: 0 0 20px rgba(100,255,218,0.25);
    }

    .choice-display.lose {
      border-color: #ff6b9d;
      background: rgba(255,107,157,0.08);
      box-shadow: 0 0 20px rgba(255,107,157,0.2);
    }

    .choice-display.tie {
      border-color: #e2b96f;
      background: rgba(226,185,111,0.08);
      box-shadow: 0 0 20px rgba(226,185,111,0.2);
    }

    .vs {
      font-size: 1.2rem;
      font-weight: 700;
      color: #8892b0;
    }

    /* ── Result banner ── */
    .result-banner {
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .result-text {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .result-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-text.win  { color: #64ffda; }
    .result-text.lose { color: #ff6b9d; }
    .result-text.tie  { color: #e2b96f; }

    /* ── Choice buttons ── */
    .choices {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .choice-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      font-size: 2.6rem;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease,
                  background 0.15s ease, box-shadow 0.15s ease;
      outline: none;
      position: relative;
    }

    .choice-btn:hover {
      transform: translateY(-4px) scale(1.08);
      border-color: #e2b96f;
      background: rgba(226,185,111,0.12);
      box-shadow: 0 8px 24px rgba(226,185,111,0.2);
    }

    .choice-btn:active {
      transform: translateY(0) scale(0.96);
    }

    .choice-btn:focus-visible {
      outline: 2px solid #e2b96f;
      outline-offset: 4px;
    }

    .choice-btn .btn-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8892b0;
      white-space: nowrap;
    }

    .choices-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .choices-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8892b0;
      margin-bottom: 0.5rem;
    }

    /* ── Reset button ── */
    .reset-btn {
      margin-top: 2.5rem;
      padding: 0.55rem 1.8rem;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #8892b0;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .reset-btn:hover {
      color: #e0e0e0;
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.1);
    }

    /* ── Pulse animation on new choice display ── */
    @keyframes pop {
      0%   { transform: scale(0.7); opacity: 0.4; }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1);   opacity: 1; }
    }

    .choice-display.animate {
      animation: pop 0.35s ease forwards;
    }
  </style>
</head>
<body>

  <h1>Rock · Paper · Scissors</h1>
  <p class="subtitle">Best of all time — make your pick</p>

  <!-- Scoreboard -->
  <div class="scoreboard" role="region" aria-label="Scoreboard">
    <div class="score-item">
      <span class="score-label">You</span>
      <span class="score-value player" id="score-player">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Ties</span>
      <span class="score-value ties" id="score-ties">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">CPU</span>
      <span class="score-value computer" id="score-computer">0</span>
    </div>
  </div>

  <!-- Arena: player vs computer -->
  <div class="arena" aria-live="polite" aria-label="Round result">
    <div class="combatant">
      <span class="combatant-label">You</span>
      <div class="choice-display" id="player-display">❓</div>
    </div>

    <span class="vs">VS</span>

    <div class="combatant">
      <span class="combatant-label">CPU</span>
      <div class="choice-display" id="computer-display">❓</div>
    </div>
  </div>

  <!-- Result text -->
  <div class="result-banner">
    <p class="result-text" id="result-text" aria-live="assertive"></p>
  </div>

  <!-- Choice buttons -->
  <div class="choices-wrapper">
    <p class="choices-label">Choose your weapon</p>
    <div class="choices">
      <button class="choice-btn" data-choice="rock"     aria-label="Rock">
        🪨<span class="btn-label">Rock</span>
      </button>
      <button class="choice-btn" data-choice="paper"    aria-label="Paper">
        📄<span class="btn-label">Paper</span>
      </button>
      <button class="choice-btn" data-choice="scissors" aria-label="Scissors">
        ✂️<span class="btn-label">Scissors</span>
      </button>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-btn" id="reset-btn" aria-label="Reset scores">Reset Scores</button>

  <script>
    // ── Game data ──────────────────────────────────────────────────
    const CHOICES = ['rock', 'paper', 'scissors'];
    const EMOJI   = { rock: '🪨', paper: '📄', scissors: '✂️' };

    // wins[a] beats wins[a][b] → true means a beats b
    const WINS_AGAINST = { rock: 'scissors', paper: 'rock', scissors: 'paper' };

    const state = { player: 0, computer: 0, ties: 0 };

    // ── DOM refs ───────────────────────────────────────────────────
    const playerDisplay   = document.getElementById('player-display');
    const computerDisplay = document.getElementById('computer-display');
    const resultText      = document.getElementById('result-text');
    const scorePlayer     = document.getElementById('score-player');
    const scoreComputer   = document.getElementById('score-computer');
    const scoreTies       = document.getElementById('score-ties');

    // ── Core logic ─────────────────────────────────────────────────
    function getComputerChoice() {
      return CHOICES[Math.floor(Math.random() * CHOICES.length)];
    }

    function getResult(player, computer) {
      if (player === computer)                  return 'tie';
      if (WINS_AGAINST[player] === computer)    return 'win';
      return 'lose';
    }

    function playRound(playerChoice) {
      const computerChoice = getComputerChoice();
      const result         = getResult(playerChoice, computerChoice);

      // Update scores
      if (result === 'win')  { state.player++;   }
      if (result === 'lose') { state.computer++; }
      if (result === 'tie')  { state.ties++;     }

      // Render
      updateDisplay(playerChoice, computerChoice, result);
      updateScoreboard();
    }

    // ── UI updates ─────────────────────────────────────────────────
    function animateDisplay(el, emoji, resultClass) {
      el.classList.remove('animate', 'win', 'lose', 'tie');
      el.textContent = emoji;
      // Force reflow to restart animation
      void el.offsetWidth;
      el.classList.add('animate', resultClass);
    }

    function updateDisplay(playerChoice, computerChoice, result) {
      // Mirror result for computer display
      const computerClass = result === 'win' ? 'lose' : result === 'lose' ? 'win' : 'tie';

      animateDisplay(playerDisplay,   EMOJI[playerChoice],   result);
      animateDisplay(computerDisplay, EMOJI[computerChoice], computerClass);

      // Result banner
      const messages = {
        win:  '🎉 You Win!',
        lose: '💀 You Lose!',
        tie:  '🤝 It\'s a Tie!',
      };

      resultText.textContent = messages[result];
      resultText.className   = 'result-text ' + result;

      // Trigger CSS transition (remove then re-add 'show')
      resultText.classList.remove('show');
      void resultText.offsetWidth;
      resultText.classList.add('show');
    }

    function updateScoreboard() {
      scorePlayer.textContent   = state.player;
      scoreComputer.textContent = state.computer;
      scoreTies.textContent     = state.ties;
    }

    // ── Event listeners ────────────────────────────────────────────
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => playRound(btn.dataset.choice));
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      state.player = 0; state.computer = 0; state.ties = 0;
      updateScoreboard();

      // Reset arena
      ['win','lose','tie','animate'].forEach(c => {
        playerDisplay.classList.remove(c);
        computerDisplay.classList.remove(c);
      });
      playerDisplay.textContent   = '❓';
      computerDisplay.textContent = '❓';

      resultText.classList.remove('show');
      resultText.textContent = '';
    });
  </script>
</body>
</html>
